<!DOCTYPE html>
<html>
<head>
    <title>My Movie App</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding-top: 50px; }
        .card { background: #444; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 20px; width: 300px; }
        img { width: 100%; border-radius: 5px; }
        input { padding: 10px; width: 200px; }
        button { padding: 10px; background: red; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎬 Movie Finder</h1>
    <input type="text" id="movieInput" placeholder="Enter movie title...">
    <button id="searchBtn">Search</button>

    <div id="displayArea"></div>

    <script src="script.js"></script>
</body>
</html>
